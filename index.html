<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Learning italian</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="bg-clouds" aria-hidden="true"></div>

    <main class="app">
      <header class="top">
        <div class="site-header">
          <div class="logo">🐾</div>
          <p class="site-title">Italiano per bimbi</p>
        </div>

        <div class="status">
          <div class="pill" id="level-pill">
            <span class="pill-label">Level</span>
            <span class="pill-value" id="level-value">0</span>
          </div>
        </div>

        <h1 id="prompt-word">Premi START per iniziare</h1>
      </header>

      <section class="card">
        <button id="start-button" class="start-button" type="button">
          START
        </button>
        <p class="hint" id="hint-text">Clicca l’animale giusto</p>

        <div class="choices" role="list">
          <button class="choice" type="button">
            <img src="images/gatto.png" alt="gatto" />
          </button>

          <button class="choice" type="button">
            <img src="images/cane.png" alt="cane" />
          </button>

          <button class="choice" type="button">
            <img src="images/coniglio.png" alt="coniglio" />
          </button>
        </div>

        <div class="footer-row">
          <div class="note" id="result-text" aria-live="polite"></div>
        </div>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="index.js" charset="utf-8"></script>
  </body>
</html>
