<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Animals</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="bg-clouds" aria-hidden="true"></div>

    <main class="app">
      <header class="top">
        <div class="site-header">
          <div class="site-left">
            <div class="logo">🐾</div>
            <p class="site-title">ANIMALS</p>
          </div>

          <div id="language-toggle" class="language-toggle">
            <div class="toggle-slider"></div>

            <div class="toggle-option option-it">
              <img src="https://flagcdn.com/w20/it.png" class="flag" />
              <span>Italiano</span>
            </div>

            <div class="toggle-option option-en">
              <span>English</span>
              <img src="https://flagcdn.com/w20/gb.png" class="flag" />
            </div>
          </div>
        </div>
        <div class="status">
          <div class="pill" id="level-pill">
            <span class="pill-label">Level</span>
            <span class="pill-value" id="level-value">0</span>
          </div>
        </div>

        <h1 id="prompt-word">Press START</h1>
      </header>

      <section class="card">
        <button id="start-button" class="start-button" type="button">
          START
        </button>
        <p class="hint" id="hint-text">Click the right animal</p>

        <div class="choices" role="list">
          <button class="choice" type="button">
            <img src="images/cat.png" alt="cat" />
          </button>

          <button class="choice" type="button">
            <img src="images/dog.png" alt="dog" />
          </button>

          <button class="choice" type="button">
            <img src="images/rabbit.png" alt="rabbit" />
          </button>
        </div>

        <div class="footer-row">
          <div class="note" id="result-text" aria-live="polite"></div>
        </div>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="index.js" charset="utf-8"></script>
  </body>
</html>
